brews:
  - repository:
      owner: jclement
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/jclement/pdfify"
    description: "Convert Markdown to beautiful PDFs via Docker"
    license: "MIT"
    install: |
      bin.install "pdfify"
    test: |
      system bin/"pdfify", "--version"
    dependencies:
      - name: docker
        type: optional

changelog:
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^ci:", "^chore:"]

release:
  prerelease: auto
  footer: |
    ## Install

    ```bash
    # macOS/Linux via Homebrew
    brew install jclement/tap/pdfify

    # Or download binaries from the assets below
    ```

    ## Docker

    Build the Docker image locally:

    ```bash
    git clone https://github.com/jclement/pdfify.git
    cd pdfify
    docker build -t pdfify .
    docker run --rm -v $(pwd):/workspace pdfify /workspace/document.md
    ```
